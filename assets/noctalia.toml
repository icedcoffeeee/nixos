[bar.default]
end = [
    "media",
    "clipboard",
    "tray",
    "recorder",
    "notifications",
    "bluetooth",
    "network",
    "volume",
    "brightness",
    "battery",
    "session"
]
margin_ends = 10
radius = 5
start = [ "launcher", "workspaces", "cpu", "temp", "ram", "sysmon", "audio_visualizer", "network_rx", "network_tx" ]
widget_spacing = 10

[location]
sunrise = "07:00"
sunset = "00:00"

[lockscreen_widgets]
enabled = true
schema_version = 2
widget_order = [
    "lockscreen-login-box@eDP-1",
    "lockscreen-widget-0000000000000001",
    "lockscreen-widget-0000000000000003",
    "lockscreen-widget-0000000000000004",
    "lockscreen-widget-0000000000000005",
    "lockscreen-widget-0000000000000006",
    "lockscreen-widget-0000000000000007"
]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 960.0
    cy = 1081.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 5.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000001]
    box_height = 304.0
    box_width = 544.0
    cx = 1104.0
    cy = 600.0
    output = "eDP-1"
    rotation = 0.0
    type = "clock"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000001.settings]
        background = false
        background_opacity = 0.5
        background_radius = 5.0
        center_text = false
        clock_style = "digital"
        font_family = ""
        format = "{:%H:%M}\\n{:%d %b %Y}"
        shadow = true

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000003]
    box_height = 144.0
    box_width = 288.0
    cx = 688.0
    cy = 352.0
    output = "eDP-1"
    rotation = 0.0
    type = "audio_visualizer"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000003.settings]
        background_radius = 5.0
        bands = 32
        show_when_idle = true

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000004]
    box_height = 144.0
    box_width = 320.0
    cx = 1000.0
    cy = 352.0
    output = "eDP-1"
    rotation = 0.0
    type = "media_player"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000004.settings]
        background_radius = 5.0

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000005]
    box_height = 144.0
    box_width = 208.0
    cx = 1272.0
    cy = 352.0
    output = "eDP-1"
    rotation = 0.0
    type = "sysmon"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000005.settings]
        background_radius = 5.0
        stat = "cpu_usage"
        stat2 = "cpu_temp"

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000006]
    box_height = 0.0
    box_width = 0.0
    cx = 676.39947509765625
    cy = 600.0
    output = "eDP-1"
    rotation = 0.0
    type = "sticker"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000006.settings]
        background = false
        image_path = "/home/icedtea/nixos/assets/mai-senpai.png"
        opacity = 1.0

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000007]
    box_height = 0.0
    box_width = 0.0
    cx = 960.0
    cy = 950.0
    output = "eDP-1"
    rotation = 0.0
    type = "label"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000007.settings]
        background = false
        description = ""
        title = "Welcome Back"

[nightlight]
enabled = true

[plugins]
enabled = [ "noctalia/screen_recorder" ]

[shell]
niri_overview_type_to_launch_enabled = true
polkit_agent = true

    [shell.panel]
    transparency_mode = "soft"

[theme]
source = "wallpaper"
wallpaper_scheme = "m3-rainbow"

[wallpaper]
enabled = true

    [wallpaper.default]
    path = "~/nixos/assets/wall.jpg"

[widget.brightness]
show_label = false

[widget.clock]
format = "{:%H:%M} {:%d %b %Y}"

[widget.media]
hide_when_no_media = true
max_length = 175
title_scroll = "on_hover"

[widget.network]
show_label = false

[widget.recorder]
type = "noctalia/screen_recorder:recorder"

[widget.sysmon]
stat = "disk_pct"

[widget.volume]
show_label = false
